<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Character Generator</title>
<link href="css/style.css" rel="stylesheet"/>
</head>
<body>
<div class="header">
<h1 data-i18n="appTitle">Character Generator</h1>
<div class="language-box">
<span data-i18n="interfaceLanguage">Interface Language</span>
<select id="language" onchange="changeLanguage()">
<option value="zh">中文</option>
<option selected="" value="en">English</option>
<option value="ja">日本語</option>
</select>
</div>
</div>
<div class="grid">
<div class="section">
<h2 data-i18n="basicInfo">基本信息</h2>
<label data-i18n="name">角色名称</label>
<input id="name"/>
<div class="inline-controls age-gender-row">
<div class="inline-control compact-control">
<label data-i18n="age">年龄</label>
<input id="age" type="number"/>
</div>
<div class="inline-control compact-control">
<label data-i18n="gender">性别</label>
<select data-option-field="gender" id="gender"></select>
</div>
</div>
<details>
<summary data-i18n="nationalitySection">国籍</summary>
<div class="checkbox-group compact" data-option-group="nationality"></div>
<label data-i18n="customNationality">自定义国籍</label>
<input id="customNationality" placeholder="Italian nationality, Canadian nationality"/>
</details>
<details>
<summary data-i18n="ethnicitySection">族裔</summary>
<div class="checkbox-group compact" data-option-group="ethnicity"></div>
<label data-i18n="customEthnicity">自定义族裔</label>
<input id="customEthnicity" placeholder="mixed Eurasian ethnicity"/>
</details>
<div class="inline-controls skin-occupation-row">
<div class="inline-control compact-control">
<label data-i18n="skinTone">肤色</label>
<select data-option-field="skinTone" id="skinTone"></select>
</div>
<div class="inline-control compact-control">
<label data-i18n="occupation">职业 / 身份</label>
<select data-option-field="occupation" id="occupation"></select>
</div>
</div>
<label data-i18n="customOccupation">自定义职业 / 身份</label>
<input id="customOccupation" placeholder="philosopher, judge, rebel leader"/>
<details>
<summary data-i18n="personalityTags">性格标签</summary>
<div class="checkbox-group compact" data-option-group="personality"></div>
<label data-i18n="customPersonality">自定义性格标签</label>
<input id="customPersonality" placeholder="sarcastic, poetic, obsessive"/>
</details>
</div>
<div class="section">
<h2><span data-i18n="hair">头发</span> / <span data-i18n="faceAndAccessories">面部与装饰</span></h2>
<div class="inline-controls hair-detail-row">
<div class="inline-control">
<label data-i18n="hairLength">发型长度</label>
<select data-option-field="hairLength" id="hairLength"></select>
</div>
<div class="inline-control">
<label data-i18n="hairColor">发色</label>
<select data-option-field="hairColor" id="hairColor"></select>
</div>
<div class="inline-control">
<label data-i18n="hairTexture">发质</label>
<select data-option-field="hairTexture" id="hairTexture"></select>
</div>
<div class="inline-control">
<label data-i18n="hairCondition">发型状态</label>
<select data-option-field="hairCondition" id="hairCondition"></select>
</div>
<div class="inline-control">
<label data-i18n="bangsShape">刘海形状</label>
<select data-option-field="bangsShape" id="bangsShape"></select>
</div>
<div class="inline-control">
<label data-i18n="hairStrands">发丝细节</label>
<select data-option-field="hairStrands" id="hairStrands"></select>
</div>
</div>
<hr/>
<label data-i18n="face">面部特征</label>
<input id="face" placeholder="sharp eyes, beauty mark, freckles"/>
<div class="inline-controls face-detail-row">
<div class="inline-control">
<label data-i18n="expression">常用表情</label>
<select data-option-field="expression" id="expression"></select>
</div>
<div class="inline-control">
<label data-i18n="eyeShape">眼型</label>
<select data-option-field="eyeShape" id="eyeShape"></select>
</div>
<div class="inline-control">
<label data-i18n="eyeColor">眼色</label>
<select data-option-field="eyeColor" id="eyeColor"></select>
</div>
<div class="inline-control">
<label data-i18n="eyeGaze">眼神</label>
<select data-option-field="eyeGaze" id="eyeGaze"></select>
</div>
</div>
<div class="inline-controls face-detail-row">
<div class="inline-control">
<label data-i18n="hat">帽子</label>
<select data-option-field="hat" id="hat"></select>
</div>
<div class="inline-control">
<label data-i18n="noseShape">鼻子</label>
<select data-option-field="noseShape" id="noseShape"></select>
</div>
<div class="inline-control">
<label data-i18n="lipsShape">嘴唇</label>
<select data-option-field="lipsShape" id="lipsShape"></select>
</div>
<div class="inline-control">
<label data-i18n="faceShape">脸型</label>
<select data-option-field="faceShape" id="faceShape"></select>
</div>
</div>
<div class="inline-controls face-detail-row">
<div class="inline-control">
<label data-i18n="neck">颈部装饰</label>
<select data-option-field="neck" id="neck"></select>
</div>
<div class="inline-control">
<label data-i18n="skinTexture">皮肤质感</label>
<select data-option-field="skinTexture" id="skinTexture"></select>
</div>
<div class="inline-control">
<label data-i18n="skinMarks">皮肤标记</label>
<select data-option-field="skinMarks" id="skinMarks"></select>
</div>
<div class="inline-control">
<label data-i18n="skinScar">疤痕</label>
<select data-option-field="skinScar" id="skinScar"></select>
</div>
</div>
<hr/>
<details>
<summary data-i18n="piercingStatus">穿孔情况</summary>
<div class="checkbox-group compact" data-option-group="piercing"></div>
</details>
</div>
<div class="section">
<h2 data-i18n="bodyShape">身材</h2>
<div class="body-top-controls">
<div class="body-control">
<label data-i18n="bodyTypeLabel">体型标签</label>
<select data-option-field="bodyType" id="bodyType" onchange="applyBodyTypePreset()"></select>
</div>
<div class="body-control">
<label data-i18n="breastShapeLabel">胸形</label>
<select data-option-field="breastShape" id="breastShape"></select>
</div>
<div class="body-control">
<label data-i18n="hipShapeLabel">臀形状</label>
<select data-option-field="hipShape" id="hipShape"></select>
</div>
</div>
<label><span data-i18n="bust">胸围</span>：<span id="bustValue">85</span> cm</label>
<input id="bust" max="130" min="50" oninput="updateRangeValue('bust')" type="range" value="85"/>
<label><span data-i18n="waist">腰围</span>：<span id="waistValue">60</span> cm</label>
<input id="waist" max="120" min="40" oninput="updateRangeValue('waist')" type="range" value="60"/>
<label><span data-i18n="hips">臀围</span>：<span id="hipsValue">88</span> cm</label>
<input id="hips" max="140" min="50" oninput="updateRangeValue('hips')" type="range" value="88"/>
<label><span data-i18n="height">身高</span>：<span id="heightValue">170</span> cm</label>
<input id="height" max="220" min="120" oninput="updateRangeValue('height')" type="range" value="170"/>
<label><span data-i18n="weight">体重</span>：<span id="weightValue">60</span> kg</label>
<input id="weight" max="150" min="30" oninput="updateRangeValue('weight')" type="range" value="60"/>
</div>
<div class="section">
<h2 data-i18n="clothing">服装</h2>
<label data-i18n="onesuit">连体衣</label>
<select data-option-field="onesuit" id="onesuit" onchange="toggleClothes()"></select>
<div id="topBottomArea">
<label data-i18n="top">上衣</label>
<select data-option-field="top" id="top"></select>
<label data-i18n="bottom">下衣</label>
<select data-option-field="bottom" id="bottom"></select>
</div>
<label data-i18n="underwear">内衣</label>
<select data-option-field="underwear" id="underwear"></select>
<div class="inline-controls clothing-detail-controls">
<div class="inline-control">
<label data-i18n="clothingMaterial">材质</label>
<select data-option-field="clothingMaterial" id="clothingMaterial"></select>
</div>
<div class="inline-control">
<label data-i18n="clothingPattern">图案</label>
<select data-option-field="clothingPattern" id="clothingPattern"></select>
</div>
</div>
<label data-i18n="clothingDetails">其他</label>
<div class="checkbox-group compact" data-option-group="clothingDetail"></div>
</div>
<div class="section">
<h2 data-i18n="limbsAndShoes">四肢与鞋</h2>
<label data-i18n="hand">手部</label>
<select data-option-field="hand" id="hand"></select>
<label data-i18n="handShape">手形</label>
<select data-option-field="handShape" id="handShape"></select>
<label data-i18n="leg">腿部</label>
<select data-option-field="leg" id="leg"></select>
<label data-i18n="legType">腿型</label>
<select data-option-field="legType" id="legType"></select>
<label data-i18n="stockingsType">丝袜类型</label>
<select data-option-field="stockingsType" id="stockingsType"></select>
<label data-i18n="shoes">鞋子</label>
<select data-option-field="shoes" id="shoes"></select>
<label data-i18n="posePreset">姿势预设</label>
<select data-option-field="posePreset" id="posePreset"></select>
</div>
<div class="section">
<h2 data-i18n="styleAtmosphere">风格与氛围</h2>
<label data-i18n="artStyle">艺术风格</label>
<select data-option-field="artStyle" id="artStyle"></select>
<label data-i18n="lighting">光线</label>
<select data-option-field="lighting" id="lighting"></select>
<label data-i18n="cameraShot">镜头</label>
<select data-option-field="cameraShot" id="cameraShot"></select>
<label data-i18n="mood">情绪/氛围</label>
<select data-option-field="mood" id="mood"></select>
</div>
<div class="section full-width">
<button data-i18n="generatePrompt" onclick="generatePrompt()">生成Prompt</button>
<button data-i18n="copyPrompt" onclick="copyPrompt()">复制Prompt</button>
<button data-i18n="saveJSON" onclick="saveJSON()">保存角色为JSON</button>
<textarea id="output"></textarea>
</div>
</div>
<script src="js/app.js"></script>
</body>
</html>
